<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse through the maps and terrains previously charted by our club.">
    <title>Orienteering Club - Map Gallery</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="global-header"></div>

    <main id="main-content">
        <section class="gallery-header">
            <h1>Terrain & Map Gallery</h1>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        </section>

        <section class="maps-grid">
            <div class="map-item">
                <img src="assets/images/map-campus.webp" alt="Campus Map Area" loading="lazy">
                <h4>Belgrad Forest Route A</h4>
            </div>
            <div class="map-item">
                <img src="assets/images/map-forest.webp" alt="Forest Map Area" loading="lazy">
                <h4>Yildiz Campus Sprint Area</h4>
            </div>
        </section>
    </main>

    <div id="global-footer"></div>

    <script src="js/main.js"></script>
</body>
</html>
