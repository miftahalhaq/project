<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join our club by filling out the official registration form.">
    <title>Orienteering Club - Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="global-header"></div>

    <main id="main-content">
        <section class="form-section">
            <h2>Club Registration Form</h2>
            <p>Please provide precise information for safety and operational setup.</p>
            
            <form id="form-registrasi">
                <div class="form-group">
                    <label for="nama">Full Name *</label>
                    <input type="text" id="nama" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="kontak-darurat">Emergency Contact Number *</label>
                    <input type="tel" id="kontak-darurat" required placeholder="08123456789">
                </div>
                <button type="submit" class="btn btn-primary">Submit Application</button>
            </form>
        </section>
    </main>

    <div id="global-footer"></div>

    <script src="js/main.js"></script>
    <script src="js/daftar.js"></script>
</body>
</html>
